version: '3.8'

services:
  mcp-task-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp-task
    container_name: vibe-mcp-task
    ports:
      - "9717:9717"
    environment:
      - HOST=0.0.0.0
      - MCP_PORT=9717
      - TRANSPORT=http
      - RUST_LOG=info
      - VIBE_BACKEND_URL=http://host.docker.internal:3105
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9717/mcp"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  mcp-system-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp-system
    container_name: vibe-mcp-system
    ports:
      - "9718:9718"
    environment:
      - HOST=0.0.0.0
      - MCP_PORT=9718
      - TRANSPORT=http
      - RUST_LOG=info
      - VIBE_BACKEND_URL=http://host.docker.internal:3105
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9718/mcp"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  default:
    name: vibe-mcp-network
